<!DOCTYPE html>
<html lang="ja">

<head>

    <!-- ==========================================
         Basic Settings
    =========================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>津路 圭太 | Digital Card</title>

    <meta name="description"
          content="津路圭太のデジタルプロフィール">

    <meta name="robots" content="noindex, nofollow">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- ==========================================
         Welcome Screen
    =========================================== -->

   <!-- ==========================================
     Intro Screen
=========================================== -->

<div id="intro-screen">

    <div class="intro-panel">

        <div class="intro-badge">
            <span class="intro-badge-icon">◉</span>
            <span class="intro-badge-text">Digital Profile</span>
        </div>

        <div class="intro-main-icon">📱</div>

        <h1 class="intro-title">
            Ready?
        </h1>

        <p class="intro-subtitle">
            Loading your profile...
        </p>

        <div class="intro-progress">
            <div class="intro-progress-bar"></div>
        </div>

        <p class="intro-hint">
            Tap to skip
        </p>

    </div>

</div>

    <!-- ==========================================
         Main Container
    =========================================== -->

    <main class="container">

        <!-- ======================================
             Profile
        ======================================= -->

        <header class="profile">

            <img
                src="images/icon.jpg"
                alt="プロフィール画像"
                class="icon">

            <h1 class="profile-name">
                津路 圭太
            </h1>

            <p class="job">

                田辺市立中辺路中学校<br>
                １年担任・数学科

            </p>

        </header>

        <!-- ======================================
             Contact
        ======================================= -->

        <section class="card contact">

            <h2>

                <i class="fa-solid fa-address-card"></i>

                Contact

            </h2>

            <a href="contact.vcf"
               class="button primary">

                <i class="fa-solid fa-user-plus"></i>

                連絡先を保存

            </a>

            <a href="mailto:nakahechi-jhs@tanabe.ed.jp"
               class="button">

                <i class="fa-solid fa-envelope"></i>

                中辺路中学校メール

            </a>

            <a href="tel:0739640243"
               class="button">

                <i class="fa-solid fa-phone"></i>

                中辺路中学校電話

            </a>

            <a href="mailto:tt20250035@tanabe.ed.jp"
   class="button">

    <i class="fa-solid fa-envelope-open"></i>

    個人メール

</a>

        </section>

<!-- ======================================
     SNS
======================================= -->

<section class="card sns">

    <h2>

        <i class="fa-solid fa-globe"></i>

        Links

    </h2>

    <a href="https://sites.google.com/tanabe-ed.com/nakahechi-jhs?usp=sharing"
       class="button"
       target="_blank"
       rel="noopener noreferrer">

        <i class="fa-solid fa-school"></i>

        本校ホームページ

    </a>

    <a href="https://www.instagram.com/ここにインスタグラムのユーザー名/"
       class="button"
       target="_blank"
       rel="noopener noreferrer">

        <i class="fa-brands fa-instagram"></i>

        Instagram

    </a>

</section>

        <!-- ======================================
             Footer
        ======================================= -->

        <footer>

            <p>

                Thank you for visiting.

            </p>

            <small>

                © 2026 Keita Tsuro

            </small>

        </footer>

    </main>

    <!-- JavaScript -->
    <script src="script.js"></script>

</html>
