<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>津路 圭太 | Digital Card</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <header>

        <img src="images/icon.jpg" class="icon">

        <h1>津路 圭太</h1>

        <p class="job">
            中学校数学教員
        </p>

        <p class="message">
            ICTを活用した授業づくりと教材開発に取り組んでいます。
        </p>

    </header>


    <section class="card">

        <h2>
            <i class="fa-solid fa-address-card"></i>
            Contact
        </h2>

        <a href="contact.vcf" class="button">
            <i class="fa-solid fa-user-plus"></i>
            連絡先を保存
        </a>

        <a href="mailto:sample@example.com" class="button">
            <i class="fa-solid fa-envelope"></i>
            メール
        </a>

        <a href="tel:09000000000" class="button">
            <i class="fa-solid fa-phone"></i>
            電話
        </a>

    </section>


    <section class="card">

        <h2>
            <i class="fa-solid fa-globe"></i>
            SNS
        </h2>

        <a href="#" class="button">
            <i class="fa-brands fa-x-twitter"></i>
            X
        </a>

        <a href="#" class="button">
            <i class="fa-brands fa-instagram"></i>
            Instagram
        </a>

        <a href="#" class="button">
            <i class="fa-brands fa-github"></i>
            GitHub
        </a>

    </section>


    <section class="card">

        <h2>
            <i class="fa-solid fa-book"></i>
            Works
        </h2>

        <a href="#" class="button">
            家庭学習ページ
        </a>

        <a href="#" class="button">
            数学教材
        </a>

        <a href="#" class="button">
            ICT活用
        </a>

    </section>


    <footer>

        © 2026 Keita Tsuji

    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
